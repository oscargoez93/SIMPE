<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPE Dashboard - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <!-- Floating animated background elements -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <div class="glass-card">
            <div class="login-header">
                <img src="images/logo.png" alt="Visión Gerencial" style="max-width: 80%; height: auto; margin-bottom: 10px;">
                <p>Sistema Integral de Monitoreo</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Recordarme
                    </label>
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text">Ingresar al Panel</span>
                    <div class="loader" style="display: none;"></div>
                </button>
                
                <div style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                    <span style="color: var(--text-muted);">¿No tienes cuenta?</span>
                    <a href="#" class="forgot-password" id="showRegister" style="font-weight: 500; margin-left: 5px;">Regístrate</a>
                </div>
            </form>

            <form id="registerForm" class="login-form" style="display: none;">
                <div class="input-group">
                    <label for="regName">Nombre Completo</label>
                    <div class="input-wrapper">
                        <input type="text" id="regName" placeholder="Ej. Juan Pérez" required autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label for="regEmail">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <input type="email" id="regEmail" placeholder="ejemplo@correo.com" required autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label for="regPassword">Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="regPassword" placeholder="Crea una contraseña" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="regConfirmPassword">Confirmar Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="regConfirmPassword" placeholder="Repite la contraseña" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="registerBtn">
                    <span class="btn-text">Crear Cuenta</span>
                    <div class="loader" style="display: none;"></div>
                </button>
                
                <div style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                    <span style="color: var(--text-muted);">¿Ya tienes cuenta?</span>
                    <a href="#" class="forgot-password" id="showLogin" style="font-weight: 500; margin-left: 5px;">Inicia sesión</a>
                </div>
            </form>

            <div class="error-message" id="errorMessage" style="display: none;">
                Credenciales incorrectas. Por favor, intenta de nuevo.
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
